name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 解压源码（修复Windows反斜杠路径）
        run: |
          mkdir temp
          python3 << 'EOF'
          import zipfile
          import os
          with zipfile.ZipFile('source.zip', 'r') as zf:
              for name in zf.namelist():
                  fixed = name.replace('\\', '/')
                  if fixed.endswith('/'):
                      os.makedirs(f'temp/{fixed}', exist_ok=True)
                      continue
                  os.makedirs(f'temp/{os.path.dirname(fixed)}', exist_ok=True)
                  with zf.open(name) as src, open(f'temp/{fixed}', 'wb') as dst:
                      dst.write(src.read())
          EOF

      - name: 自动定位项目根并移动文件
        run: |
          PROJECT_ROOT=$(find temp -name "gradlew" -type f | head -1 | xargs dirname)
          if [ -z "$PROJECT_ROOT" ]; then
            echo "错误：压缩包内找不到gradlew"
            ls -R temp
            exit 1
          fi
          shopt -s dotglob
          mv "$PROJECT_ROOT"/* .
          rm -rf temp

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Setup Android SDK + NDK + CMake
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: 36.0.0
          ndk: 27.3.13750724
          cmake: 3.31.6

      - name: 赋予gradlew执行权限
        run: chmod +x gradlew

      - name: 构建Debug APK
        run: ./gradlew :app:assembleDebug

      - name: 上传APK产物
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: app/build/outputs/apk/debug/app-debug.apk
