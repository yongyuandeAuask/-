name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 解压源码并自动定位项目根目录
        run: |
          mkdir temp
          # 用Python解压，兼容Windows反斜杠路径的zip包
          python3 -c "import zipfile; zipfile.ZipFile('source.zip').extractall('temp')"
          # 自动找到包含gradlew的目录作为项目根
          PROJECT_ROOT=$(find temp -name "gradlew" -type f | head -1 | xargs dirname)
          if [ -z "$PROJECT_ROOT" ]; then
            echo "错误：压缩包里找不到gradlew文件"
            ls -R temp
            exit 1
          fi
          # 将项目文件移到工作区根目录
          mv "$PROJECT_ROOT"/* .
          rm -rf temp

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Setup Android SDK + NDK + CMake
        uses: android-actions/setup-android@v3
        with:
          api-level: 36
          build-tools: 36.0.0
          ndk: 27.3.13750724
          cmake: 3.31.6

      - name: 赋予gradlew执行权限
        run: chmod +x gradlew

      - name: 构建Debug APK
        run: ./gradlew :app:assembleDebug

      - name: 上传APK产物
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: app/build/outputs/apk/debug/app-debug.apk
